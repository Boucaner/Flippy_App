<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1a1a2e"/>

  <!-- Grid of tiles: 3x3 arrangement, centered -->
  <!-- Row 1 -->
  <rect x="96"  y="96"  width="96" height="96" rx="16" fill="#FF3380"/>
  <rect x="208" y="96"  width="96" height="96" rx="16" fill="#3357FF"/>
  <rect x="320" y="96"  width="96" height="96" rx="16" fill="#F3FF33"/>

  <!-- Row 2 -->
  <rect x="96"  y="208" width="96" height="96" rx="16" fill="#33FFF3"/>
  <!-- Center tile: flipped (showing grey back) with a subtle shine -->
  <rect x="208" y="208" width="96" height="96" rx="16" fill="#555577"/>
  <rect x="208" y="208" width="96" height="40" rx="16" fill="#6666aa" opacity="0.5"/>
  <!-- question mark on flipped tile -->
  <text x="256" y="272" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#aaaacc">?</text>

  <rect x="320" y="208" width="96" height="96" rx="16" fill="#FF8C33"/>

  <!-- Row 3 -->
  <rect x="96"  y="320" width="96" height="96" rx="16" fill="#8C33FF"/>
  <rect x="208" y="320" width="96" height="96" rx="16" fill="#33FF57"/>
  <rect x="320" y="320" width="96" height="96" rx="16" fill="#FF0000"/>

  <!-- Subtle inner shadow / overlay to give depth to colored tiles -->
  <rect x="96"  y="96"  width="96" height="32" rx="10" fill="white" opacity="0.12"/>
  <rect x="208" y="96"  width="96" height="32" rx="10" fill="white" opacity="0.12"/>
  <rect x="320" y="96"  width="96" height="32" rx="10" fill="white" opacity="0.12"/>
  <rect x="96"  y="208" width="96" height="32" rx="10" fill="white" opacity="0.12"/>
  <rect x="320" y="208" width="96" height="32" rx="10" fill="white" opacity="0.12"/>
  <rect x="96"  y="320" width="96" height="32" rx="10" fill="white" opacity="0.12"/>
  <rect x="208" y="320" width="96" height="32" rx="10" fill="white" opacity="0.12"/>
  <rect x="320" y="320" width="96" height="32" rx="10" fill="white" opacity="0.12"/>
</svg>
